<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Restaurant</title>
    <link rel="stylesheet" href="css1.css">
</head>
<body class="reg-body">

    <div class="reg-container">
        <div class="reg-header">
            <h2 class="reg-title">Create Account</h2>
            <p class="reg-subtitle">Join us and enjoy delicious meals</p>
        </div>

        <form class="reg-form" id="registerForm">
            <div class="reg-input-group">
                <label for="reg-name" class="reg-label">Full Name</label>
                <input type="text" id="reg-name" class="reg-input" placeholder="Enter your full name" required>
            </div>

            <div class="reg-input-group">
                <label for="reg-email" class="reg-label">Email Address</label>
                <input type="email" id="reg-email" class="reg-input" placeholder="Enter your email" required>
            </div>

            <div class="reg-input-group">
                <label for="reg-password" class="reg-label">Password</label>
                <input type="password" id="reg-password" class="reg-input" placeholder="Create a password" required>
            </div>

            <button type="submit" class="reg-submit-btn">Sign Up</button>

            <p class="reg-footer-text">
                Already have an account? <a href="#" class="reg-login-link">Log In</a>
            </p>
        </form>
        
        <p id="reg-message" class="reg-message"></p>
    </div>

    <script src="js1.js"></script>
</body>
</html>
