<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Food Feed</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
}

h1 {
    text-align: center;
    padding: 20px;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 12px;
    padding: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.card h2 {
    text-align: center;
}

.card p {
    text-align: center;
    color: #555;
}

iframe {
    width: 100%;
    height: 560px;
    border-radius: 10px;
}
</style>

</head>

<body>

<h1>Food Feed 🍔🍕🍝🍰</h1>

<div class="container">

    <div class="card">
        <h2>Pizza</h2>
        <iframe src="https://www.youtube.com/embed/m0wcUT7fiNc" allowfullscreen></iframe>
        <p>Cheesy pizza with a great taste.</p>
    </div>

    <div class="card">
        <h2>Burger</h2>
        <iframe src="https://www.youtube.com/embed/2L679Vwvzrw" allowfullscreen></iframe>
        <p>Juicy burger with cheese.</p>
    </div>

    <div class="card">
        <h2>Pasta</h2>
        <iframe src="https://www.youtube.com/embed/zP_kNvR4Jqs" allowfullscreen></iframe>
        <p>Pasta with delicious sauce.</p>
    </div>

    <div class="card">
        <h2>Cordon Bleu</h2>
        <iframe src="https://www.youtube.com/embed/sSshgEWmKMs" allowfullscreen></iframe>
        <p>Crispy outside and soft inside.</p>
    </div>

    <div class="card">
        <h2>Cake</h2>
        <iframe src="https://www.youtube.com/embed/bHueY6yDsfk" allowfullscreen></iframe>
        <p>Delicious cake recipe.</p>
    </div>

</div>

</body>
</html>
